runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  maxInstances: 10
  minInstances: 0

env:
  # ── Firebase Client (públicas) ──────────────────────────────────────────────
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyB5VirCJxGn6T5viBMEcL8DaCjTXZDzyIs
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: fisiatria-ucn.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: fisiatria-ucn
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: fisiatria-ucn.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "17088051232"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:17088051232:web:9930c6f1016e8eecbc6445
    availability:
      - BUILD
      - RUNTIME

  # ── Firebase Admin (secretas — se guardan en Secret Manager) ───────────────
  - variable: FIREBASE_ADMIN_PROJECT_ID
    value: fisiatria-ucn
    availability:
      - RUNTIME

  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL
    availability:
      - RUNTIME

  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
    availability:
      - RUNTIME
